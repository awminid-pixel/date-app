<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bearShadow" cx="50%" cy="90%" r="50%" fx="50%" fy="90%">
      <stop offset="0%" stop-color="#db2777" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#db2777" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="180" rx="60" ry="15" fill="url(#bearShadow)" />

  <!-- Bear Body -->
  <path d="M 60,160 C 60,110 50,70 100,70 C 150,70 140,110 140,160 C 140,180 60,180 60,160 Z" fill="#d4a373" />
  
  <!-- Ears -->
  <circle cx="65" cy="70" r="18" fill="#d4a373" />
  <circle cx="65" cy="70" r="10" fill="#fae1dd" />
  <circle cx="135" cy="70" r="18" fill="#d4a373" />
  <circle cx="135" cy="70" r="10" fill="#fae1dd" />
  
  <!-- Head -->
  <circle cx="100" cy="100" r="45" fill="#d4a373" />
  
  <!-- Eyes -->
  <circle cx="85" cy="95" r="5" fill="#333" />
  <circle cx="115" cy="95" r="5" fill="#333" />
  
  <!-- Cheeks -->
  <ellipse cx="75" cy="105" rx="8" ry="4" fill="#ffb5a7" opacity="0.6" />
  <ellipse cx="125" cy="105" rx="8" ry="4" fill="#ffb5a7" opacity="0.6" />
  
  <!-- Snout -->
  <ellipse cx="100" cy="110" rx="15" ry="12" fill="#fae1dd" />
  <path d="M 95,108 C 100,105 105,108 105,108 C 105,108 100,112 95,108 Z" fill="#333" />
  <path d="M 100,108 L 100,115" stroke="#333" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 95,117 Q 100,120 105,117" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none" />
  
  <!-- Arms holding heart -->
  <path d="M 70,135 C 60,145 70,160 80,150" fill="none" stroke="#d4a373" stroke-width="12" stroke-linecap="round" />
  <path d="M 130,135 C 140,145 130,160 120,150" fill="none" stroke="#d4a373" stroke-width="12" stroke-linecap="round" />
  
  <!-- Heart -->
  <path d="M 100,160 L 85,145 A 12,12 0 0,1 100,135 A 12,12 0 0,1 115,145 Z" fill="#ff4d6d" />
  
  <!-- Floating Hearts Animation Elements (Static in SVG, will be animated via CSS/Framer if needed, but keeping them static here) -->
  <path d="M 140,60 L 135,55 A 5,5 0 0,1 140,50 A 5,5 0 0,1 145,55 Z" fill="#ff4d6d" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
    <animate attributeName="transform" type="translate" values="0,0; -5,-10; 0,0" dur="2s" repeatCount="indefinite" />
  </path>
  
  <path d="M 60,40 L 55,35 A 8,8 0 0,1 60,25 A 8,8 0 0,1 65,35 Z" fill="#ff4d6d" opacity="0.6">
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" />
    <animate attributeName="transform" type="translate" values="0,0; 5,-15; 0,0" dur="3s" repeatCount="indefinite" />
  </path>
</svg>
